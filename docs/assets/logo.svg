<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 120">
  <!-- Background -->
  <rect width="240" height="120" fill="#0f0f0f"/>

  <!-- Left weight plate - large solid square -->
  <rect x="20" y="30" width="40" height="60" fill="#ff9500"/>

  <!-- Left collar - small connector -->
  <rect x="62" y="50" width="8" height="20" fill="#ff9500"/>

  <!-- Center grip bar - horizontal with grip lines -->
  <rect x="72" y="52" width="96" height="16" fill="#ff9500"/>

  <!-- Grip texture lines - simple and clear -->
  <line x1="85" y1="52" x2="85" y2="68" stroke="#0f0f0f" stroke-width="1"/>
  <line x1="98" y1="52" x2="98" y2="68" stroke="#0f0f0f" stroke-width="1"/>
  <line x1="111" y1="52" x2="111" y2="68" stroke="#0f0f0f" stroke-width="1"/>
  <line x1="124" y1="52" x2="124" y2="68" stroke="#0f0f0f" stroke-width="1"/>
  <line x1="137" y1="52" x2="137" y2="68" stroke="#0f0f0f" stroke-width="1"/>
  <line x1="150" y1="52" x2="150" y2="68" stroke="#0f0f0f" stroke-width="1"/>

  <!-- Right collar - small connector -->
  <rect x="170" y="50" width="8" height="20" fill="#ff9500"/>

  <!-- Right weight plate - large solid square -->
  <rect x="180" y="30" width="40" height="60" fill="#ff9500"/>
</svg>