<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <rect width="200" height="200" fill="#0f0f0f"/>

  <!-- Barbell Design -->
  <!-- Left weight plate -->
  <rect x="20" y="70" width="30" height="60" fill="#c9b89d" stroke="#c9b89d" stroke-width="1.5"/>

  <!-- Left inner circle detail -->
  <circle cx="35" cy="100" r="12" fill="none" stroke="#c9b89d" stroke-width="1.5"/>

  <!-- Left bar section -->
  <rect x="52" y="90" width="25" height="20" fill="#c9b89d"/>

  <!-- Center bar (main grip) -->
  <rect x="77" y="85" width="46" height="30" fill="#c9b89d"/>

  <!-- Center bar grip lines (technical detail) -->
  <line x1="80" y1="85" x2="80" y2="115" stroke="#0f0f0f" stroke-width="1.5"/>
  <line x1="87" y1="85" x2="87" y2="115" stroke="#0f0f0f" stroke-width="1.5"/>
  <line x1="94" y1="85" x2="94" y2="115" stroke="#0f0f0f" stroke-width="1.5"/>
  <line x1="101" y1="85" x2="101" y2="115" stroke="#0f0f0f" stroke-width="1.5"/>
  <line x1="108" y1="85" x2="108" y2="115" stroke="#0f0f0f" stroke-width="1.5"/>
  <line x1="115" y1="85" x2="115" y2="115" stroke="#0f0f0f" stroke-width="1.5"/>
  <line x1="122" y1="85" x2="122" y2="115" stroke="#0f0f0f" stroke-width="1.5"/>

  <!-- Right bar section -->
  <rect x="123" y="90" width="25" height="20" fill="#c9b89d"/>

  <!-- Right weight plate -->
  <rect x="150" y="70" width="30" height="60" fill="#c9b89d" stroke="#c9b89d" stroke-width="1.5"/>

  <!-- Right inner circle detail -->
  <circle cx="165" cy="100" r="12" fill="none" stroke="#c9b89d" stroke-width="1.5"/>
</svg>